name: Deploy to Cloudflare Pages

# Builds the Vite app and deploys to the `ap127-v3` Cloudflare Pages project
# on every push to main. Mirrors the wrangler-in-Actions pattern used by
# AP127_Docs and the dispatcher worker. Requires ONE repo secret:
# CLOUDFLARE_API_TOKEN (Cloudflare → My Profile → API Tokens →
# "Cloudflare Pages — Edit" template). The account id is public (it's in the
# dashboard URL) so it's set inline.
#
# OPEN ITEM: this secret is not yet set on this repo (see README/CLAUDE.md) —
# until it is, deploys are manual (`npx wrangler pages deploy dist --project-name ap127-v3`).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npx vite build
      - name: Deploy to Cloudflare Pages
        run: npx --yes wrangler@4 pages deploy dist --project-name ap127-v3 --branch main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ae38e04e56d0ae52d3ec47ad29977587
