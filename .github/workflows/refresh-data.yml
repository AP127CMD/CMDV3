name: Refresh data snapshots

# V3 is a read-only mirror of the same three upstreams V2 uses (Command
# Center's flight-data.js, the ap127-data-api worker, DB001's cache.json).
# The ingest normalizes + validates and writes public/data/*.json with a
# provenance manifest; only real content changes are committed. The app
# fetches these files from the repo's raw URL, so data freshness does NOT
# depend on a Pages deploy.

on:
  schedule:
    - cron: '25 * * * *' # hourly at :25 — after CC's top-of-hour scrape, offset from V2's :20
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ingest snapshots
        run: npm run ingest

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data
          if git diff --cached --quiet; then
            echo "No snapshot changes — nothing to commit."
          else
            git commit -m "chore: refresh data snapshots $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            # Push with retry. On a non-fast-forward rejection, replay our commit
            # on top of the new remote tip, keeping OUR freshly written snapshots
            # (`-X theirs` auto-resolves conflicts on the regenerated files).
            for attempt in 1 2 3 4 5; do
              if git push origin main; then
                echo "Pushed on attempt $attempt"; break
              fi
              if [ "$attempt" = 5 ]; then
                echo "::error::push failed after 5 attempts"; exit 1
              fi
              echo "Push rejected — syncing with remote (attempt $attempt)…"
              git fetch origin main
              git rebase -X theirs origin/main || { git rebase --abort; exit 1; }
              sleep $((attempt * 3))
            done
          fi

      - name: Report failure as an issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `[Refresh] V3 data ingest failed – ${new Date().toISOString().slice(0,16)} UTC`;
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'refresh-failure',
            });
            if (open.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title,
                body: [
                  `Workflow run failed: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                  '',
                  'public/data snapshots may be stale. Likely causes:',
                  '- Command Center `flight-data.js` raw URL changed or that repo went private',
                  '- the `ap127-data-api` worker is down or changed its response shape',
                  '- DB001 cache.json moved or changed shape',
                  '',
                  'A single source failing is tolerated (previous snapshot kept); this issue',
                  'means the run itself failed. Re-run from the Actions tab once healthy.',
                ].join('\n'),
                labels: ['refresh-failure'],
              });
            }
